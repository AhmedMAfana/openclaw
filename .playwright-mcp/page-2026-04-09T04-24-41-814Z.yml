`routes/webapi.php` | Frontend: `resources/ts/main.ts` bootstraps Vue + Vuetify + Pinia + Router | Docker: MySQL + Redis + Meilisearch + Mailhog SUMMARY: Tagh Works is a large-scale, multi-tenant Laravel + Vue 3 fulfillment SaaS with 24 modular packages, 13 channel integrations, 10 shipping carriers, 93 DB migrations, and a fully dynamic frontend supporting real-time operations, multi-language, and RBAC. FILES: `composer.json`, `package.json`, `routes/api.php`, `routes/web.php`, `routes/webapi.php`, `resources/ts/main.ts`, `packages/tagh/`, `packages/channels/`, `packages/shippers/`, `database/migrations/`, `config/app.php`, `docker-compose.yml`, `.env.example` Approve to start coding?"
