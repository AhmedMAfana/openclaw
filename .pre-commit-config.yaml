# Pre-commit hooks for TAGH Dev.
#
# Minimal baseline scoped to Constitution Principle IX (Async-Python Correctness):
# catch blocking I/O, dangling asyncio tasks, and missing timeouts before they land.
# Broader formatting / typing hooks are intentionally deferred to a follow-up.
#
# Run locally: pre-commit run --all-files
# Install as git hook: pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: ruff (async-correctness rules)
        args:
          - "--select=ASYNC"       # asyncio-sync-in-async, dangling task, etc.
          - "--select=RUF006"      # asyncio.create_task without held reference
          - "--fix=false"          # analysis only — no auto-apply in pre-commit
          - "--force-exclude"
        files: \.py$
        # Scope to async-heavy code paths; expand as the team opts in.
        exclude: ^(alembic/|tests/fixtures/|migrations/)

  - repo: local
    hooks:
      # Pipeline-integrity audits — catch the class of bug that silently
      # broke the chat UI on 2026-04-24 (backend emits an event, frontend
      # doesn't handle it, type checker has nothing to say). Static, fast,
      # offline. Add new audits as new contracts emerge.
      - id: audit-stream-events
        name: audit stream-event contract (backend ↔ frontend)
        entry: python scripts/audit_stream_events.py
        language: system
        pass_filenames: false
        files: ^(src/openclow/api/routes/assistant\.py|chat_frontend/src/App\.tsx)$

      - id: audit-arq-jobs
        name: audit ARQ enqueue_job names ↔ worker registrations
        entry: python scripts/audit_arq_jobs.py
        language: system
        pass_filenames: false
        # Run on any change under src/ — enqueue_job calls and the
        # worker function list both live here, and either side moving
        # could drift the contract.
        files: ^src/openclow/.*\.py$
