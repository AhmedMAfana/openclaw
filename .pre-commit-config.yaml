# Pre-commit hooks for TAGH Dev.
#
# Minimal baseline scoped to Constitution Principle IX (Async-Python Correctness):
# catch blocking I/O, dangling asyncio tasks, and missing timeouts before they land.
# Broader formatting / typing hooks are intentionally deferred to a follow-up.
#
# Run locally: pre-commit run --all-files
# Install as git hook: pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: ruff (async-correctness rules)
        args:
          - "--select=ASYNC"       # asyncio-sync-in-async, dangling task, etc.
          - "--select=RUF006"      # asyncio.create_task without held reference
          - "--fix=false"          # analysis only — no auto-apply in pre-commit
          - "--force-exclude"
        files: \.py$
        # Scope to async-heavy code paths; expand as the team opts in.
        exclude: ^(alembic/|tests/fixtures/|migrations/)

  - repo: local
    hooks:
      # Architecture-fitness suite — runs every scripts/fitness/check_*.py
      # via scripts/pipeline_fitness.py. Each check is mapped to one or
      # more constitution principles; see .claude/skills/pipeline-audit/
      # SKILL.md for the catalogue. Default --fail-on=critical so the
      # commit blocks ONLY on hard violations; high-severity drift is
      # surfaced in the report but doesn't fail the commit (so a Phase
      # 10 work-in-progress branch isn't gated by frontend handlers
      # that are deliberately scoped for a follow-up commit).
      - id: pipeline-fitness
        name: pipeline-fitness suite (constitution principles)
        entry: python scripts/pipeline_fitness.py --fail-on critical
        language: system
        pass_filenames: false
        # Run on changes to any contract surface: backend, schema,
        # codegen, frontend, validators, fitness checks themselves.
        files: ^(src/openclow/.*\.py|chat_frontend/src/.*\.(ts|tsx)|specs/001-per-chat-instances/contracts/.*|scripts/(fitness/.*|codegen/.*|pipeline_fitness)\.py|src/openclow/setup/compose_templates/.*\.yml)$

      # Codegen freshness gate — generated TS types must match the
      # JSON schema. Lower-severity than fitness (a stale codegen is
      # easy to fix and doesn't ship code that will crash) but still
      # blocks commits that bumped the schema without rerunning codegen.
      - id: codegen-stream-events-fresh
        name: stream-event TS types match the JSON schema
        entry: python scripts/codegen/gen_stream_event_types.py --check
        language: system
        pass_filenames: false
        files: ^(specs/001-per-chat-instances/contracts/stream-events\.schema\.json|chat_frontend/src/types/stream-events\.ts)$
