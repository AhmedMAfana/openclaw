<div class="bg-white rounded-xl border border-gray-200 p-6">
    <h3 class="text-lg font-semibold text-gray-900 mb-1">Step 1: LLM / AI Provider</h3>
    <p class="text-sm text-gray-500 mb-6">Choose which AI model powers your development agents</p>

    <form id="wizard-form">
        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-2">Provider</label>
            <div class="flex gap-3">
                <label class="flex items-center gap-2 px-4 py-3 border border-brand-500 bg-brand-50 rounded-lg cursor-pointer">
                    <input type="radio" name="type" value="claude" checked class="text-brand-600">
                    <span class="font-medium">Claude</span>
                    <span class="provider-badge available">Active</span>
                </label>
                <label class="flex items-center gap-2 px-4 py-3 border border-gray-200 rounded-lg opacity-50 cursor-not-allowed">
                    <input type="radio" name="type" value="openai" disabled>
                    <span class="font-medium">OpenAI</span>
                    <span class="provider-badge coming-soon">Soon</span>
                </label>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Coder Max Turns</label>
                <input type="number" name="coder_max_turns" value="50" min="1" max="200" class="form-input">
                <p class="text-xs text-gray-400 mt-1">Max tool-use turns for the coder agent</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Reviewer Max Turns</label>
                <input type="number" name="reviewer_max_turns" value="20" min="1" max="100" class="form-input">
                <p class="text-xs text-gray-400 mt-1">Max tool-use turns for the reviewer agent</p>
            </div>
        </div>

        <!-- Test -->
        <div class="mb-4">
            <button type="button"
                hx-post="/api/settings/test/llm"
                hx-vals='{"type": "claude"}'
                hx-target="#wizard-test"
                hx-swap="innerHTML"
                class="text-sm px-3 py-1.5 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors"
            >
                <span class="btn-text">Test Connection</span>
                <span class="btn-loading items-center gap-1">
                    <svg class="w-3 h-3 spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke-width="4" opacity="0.25"/><path d="M4 12a8 8 0 018-8" stroke-width="4"/></svg>
                    Testing...
                </span>
            </button>
            <div id="wizard-test" class="mt-2"></div>
        </div>
    </form>

    <!-- Navigation -->
    <div class="flex justify-between pt-5 border-t border-gray-100">
        <div></div>
        <button onclick="saveAndNext('llm')" class="px-5 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 text-sm font-medium">
            Save & Next
        </button>
    </div>
</div>
