<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAGH DevOps Web Chat - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white mb-2">TAGH DevOps</h1>
                <p class="text-slate-400">AI Dev Orchestrator — Web Chat</p>
            </div>

            <!-- Login Card -->
            <div class="bg-slate-800 rounded-lg shadow-2xl border border-slate-700 p-8">
                {% if error %}
                <div class="mb-4 p-3 bg-red-500/20 border border-red-500 text-red-200 rounded">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                        <input
                            type="text"
                            name="username"
                            placeholder="your_username"
                            required
                            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                        />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                        <input
                            type="password"
                            name="password"
                            placeholder="••••••••"
                            required
                            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                        />
                    </div>

                    <button
                        type="submit"
                        class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors mt-6"
                    >
                        Sign In
                    </button>
                </form>

                <p class="text-center text-slate-400 text-sm mt-4">
                    Ask your admin for credentials
                </p>
            </div>

            <!-- Footer -->
            <p class="text-center text-slate-500 text-xs mt-8">
                TAGH DevOps © 2026 • <a href="/settings" class="text-slate-400 hover:text-slate-300">Settings</a>
            </p>
        </div>
    </div>
</body>
</html>
