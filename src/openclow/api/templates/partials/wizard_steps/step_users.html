<div class="bg-white rounded-xl border border-gray-200 p-6">
    <h3 class="text-lg font-semibold text-gray-900 mb-1">Step 5: Users</h3>
    <p class="text-sm text-gray-500 mb-6">Add users who can interact with OpenClow</p>

    <!-- Existing users list -->
    <div id="wizard-users-list" class="space-y-2 mb-4">
        <!-- Populated by JS -->
    </div>

    <!-- Add user form -->
    <form id="wizard-user-form" class="space-y-4 border border-gray-200 rounded-lg p-4 bg-gray-50">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">User ID <span class="text-red-400">*</span></label>
                <input type="text" name="chat_provider_uid" class="form-input" required placeholder="e.g. 123456789">
                <p class="text-xs text-gray-400 mt-1">Send /start to @userinfobot on Telegram</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Optional display name">
            </div>
        </div>
        <button type="button" onclick="addWizardUser()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium">
            Add User
        </button>
    </form>

    <!-- Navigation -->
    <div class="flex justify-between pt-5 mt-5 border-t border-gray-100">
        <button onclick="prevStep()" class="px-5 py-2 text-gray-600 hover:text-gray-800 text-sm">Back</button>
        <button onclick="nextStep()" class="px-5 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 text-sm font-medium">
            Next — Review
        </button>
    </div>
</div>

<script>
async function addWizardUser() {
    const form = document.getElementById('wizard-user-form');
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());
    data.chat_provider_type = 'telegram';
    data.is_allowed = true;

    try {
        const resp = await fetch('/api/settings/users', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await resp.json();
        if (resp.ok) {
            showToast('User added: ' + (result.username || result.chat_provider_uid), 'success');
            const list = document.getElementById('wizard-users-list');
            const item = document.createElement('div');
            item.className = 'flex items-center justify-between px-4 py-2 bg-white border border-gray-200 rounded-lg';
            item.innerHTML = `<div><span class="font-medium text-sm">${result.username || 'No username'}</span> <span class="text-xs text-gray-400 font-mono">${result.chat_provider_uid}</span></div><span class="text-xs text-green-600">Added</span>`;
            list.appendChild(item);
            form.reset();
        } else {
            showToast(result.detail || 'Failed to add user', 'error');
        }
    } catch(e) {
        showToast('Network error', 'error');
    }
}
</script>
