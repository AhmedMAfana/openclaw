<div class="bg-white rounded-xl border border-gray-200 p-6">
    <h3 class="text-lg font-semibold text-gray-900 mb-1">Step 6: Review & Launch</h3>
    <p class="text-sm text-gray-500 mb-6">Verify your configuration before going live</p>

    <!-- Config summary (loaded dynamically) -->
    <div id="review-summary" class="space-y-4">
        <div class="animate-pulse space-y-3">
            <div class="h-4 bg-gray-200 rounded w-1/3"></div>
            <div class="h-10 bg-gray-100 rounded"></div>
            <div class="h-4 bg-gray-200 rounded w-1/3"></div>
            <div class="h-10 bg-gray-100 rounded"></div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-between pt-5 mt-5 border-t border-gray-100">
        <button onclick="prevStep()" class="px-5 py-2 text-gray-600 hover:text-gray-800 text-sm">Back</button>
        <a href="/settings" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium">
            Complete Setup
        </a>
    </div>
</div>

<script>
// Load review summary
(async function() {
    try {
        const [configResp, statusResp] = await Promise.all([
            fetch('/api/settings/config'),
            fetch('/api/settings/setup-status')
        ]);
        const config = await configResp.json();
        const status = await statusResp.json();

        const summary = document.getElementById('review-summary');

        let html = '';

        // Provider configs
        const sections = [
            { key: 'llm.provider', label: 'LLM / AI', icon: 'computer' },
            { key: 'chat.provider', label: 'Chat Platform', icon: 'chat' },
            { key: 'git.provider', label: 'Git Provider', icon: 'code' },
        ];

        for (const section of sections) {
            const cfg = config[section.key];
            const isConfigured = !!cfg;
            html += `
                <div class="flex items-start gap-3 p-4 rounded-lg ${isConfigured ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}">
                    <span class="status-dot mt-1 ${isConfigured ? 'status-ok' : 'status-error'}"></span>
                    <div class="flex-1">
                        <p class="font-medium text-sm text-gray-900">${section.label}</p>
                        ${isConfigured
                            ? `<p class="text-xs text-gray-500 mt-0.5">Provider: <span class="font-medium capitalize">${cfg.type || 'unknown'}</span></p>`
                            : `<p class="text-xs text-red-600 mt-0.5">Not configured — <a href="/settings/${section.key.split('.')[0]}" class="underline">set up now</a></p>`
                        }
                    </div>
                </div>
            `;
        }

        // Projects & Users count
        html += `
            <div class="grid grid-cols-2 gap-3 mt-2">
                <div class="p-4 rounded-lg ${status.project_count > 0 ? 'bg-green-50 border border-green-200' : 'bg-amber-50 border border-amber-200'}">
                    <p class="text-2xl font-bold ${status.project_count > 0 ? 'text-green-700' : 'text-amber-700'}">${status.project_count}</p>
                    <p class="text-xs text-gray-500">Projects</p>
                </div>
                <div class="p-4 rounded-lg ${status.user_count > 0 ? 'bg-green-50 border border-green-200' : 'bg-amber-50 border border-amber-200'}">
                    <p class="text-2xl font-bold ${status.user_count > 0 ? 'text-green-700' : 'text-amber-700'}">${status.user_count}</p>
                    <p class="text-xs text-gray-500">Users</p>
                </div>
            </div>
        `;

        // Overall status
        if (status.is_complete) {
            html += `
                <div class="p-4 bg-green-100 border border-green-300 rounded-lg text-center mt-2">
                    <p class="text-green-800 font-semibold">All set! OpenClow is ready to use.</p>
                    <p class="text-xs text-green-600 mt-1">Your bot is configured and ready to accept tasks</p>
                </div>
            `;
        } else {
            html += `
                <div class="p-4 bg-amber-100 border border-amber-300 rounded-lg text-center mt-2">
                    <p class="text-amber-800 font-semibold">Setup incomplete</p>
                    <p class="text-xs text-amber-600 mt-1">Missing: ${status.missing.join(', ') || 'projects'}</p>
                </div>
            `;
        }

        summary.innerHTML = html;
    } catch(e) {
        document.getElementById('review-summary').innerHTML = '<p class="text-red-600 text-sm">Failed to load configuration summary</p>';
    }
})();
</script>
