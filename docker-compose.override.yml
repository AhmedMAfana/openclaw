# Dev overrides — auto-loaded by docker compose
# Rules:
#  - No hardcoded paths anywhere.
#  - api/bot run as the image's USER so Claude CLI auth works correctly.
#  - worker needs root only to fix docker.sock perms, then drops back to openclow via su -l.

services:
  bot:
    command: >
      bash -c "
        exec watchfiles --ignore-paths __pycache__,*.egg-info,.pytest_cache --grace-period 3 'python -m openclow.bot.main' src/
      "
    volumes:
      - ./src:/app/src:cached
    environment:
      - LOG_LEVEL=DEBUG

  api:
    command: >
      uvicorn openclow.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src:cached
    environment:
      - LOG_LEVEL=DEBUG

  worker:
    command: >
      bash -c "
        chmod 666 /var/run/docker.sock 2>/dev/null || true;
        exec su -l openclow -c 'arq openclow.worker.arq_app.WorkerSettings'
      "
    user: root
    volumes:
      - ./src:/app/src:cached
      - ./workspaces_dev:/workspaces
      - claude_auth:/home/openclow/.claude
    environment:
      - LOG_LEVEL=DEBUG

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
