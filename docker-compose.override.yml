# Dev overrides — auto-loaded by docker compose
services:
  bot:
    command: >
      bash -c "
        exec watchfiles --ignore-paths __pycache__,*.egg-info,.pytest_cache --grace-period 3 'python -m openclow.bot.main' src/
      "
    volumes:
      - ./src:/app/src:cached
    environment:
      - LOG_LEVEL=DEBUG

  api:
    command: >
      bash -c "
        if [ -z \"$$WEB_CHAT_JWT_SECRET\" ]; then
          JWT_FILE=/home/openclow/.claude/.jwt_secret;
          [ -f $$JWT_FILE ] || openssl rand -hex 32 > $$JWT_FILE;
          export WEB_CHAT_JWT_SECRET=$$(cat $$JWT_FILE);
          echo '[api] WEB_CHAT_JWT_SECRET loaded from volume';
        fi;
        exec uvicorn openclow.api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src/openclow/api --reload-dir src/openclow/models --timeout-graceful-shutdown 5
      "
    volumes:
      - ./src:/app/src:cached
      - ./workspaces_dev:/workspaces
      - ./dev-sandbox:/app/dev-sandbox:cached
      - ./alembic:/app/alembic:cached
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LOG_LEVEL=DEBUG

  worker:
    # Dev: wrap arq with watchfiles so renderer / tasks code changes
    # auto-reload without a manual `docker compose restart worker`.
    # Without this, edits to instance_tasks.py / *_renderer.py sit on
    # disk while the running arq process keeps the OLD module loaded —
    # producing the "I shipped the change but provisioning is still
    # broken" deploy-staleness surprise. The `--filter python` keeps
    # it cheap (no reload on .pyc churn). Grace period 3s lets the
    # current ARQ job finish before kill.
    command: >
      bash -c "
        chmod 666 /var/run/docker.sock 2>/dev/null || true;
        python3 -c 'import asyncio; from openclow.services.docker_guard import _detect_host_workspace_path; asyncio.run(_detect_host_workspace_path())' 2>/dev/null || true;
        exec su -l openclow -c 'watchfiles --filter python --ignore-paths __pycache__,*.egg-info,.pytest_cache --grace-period 3 \"arq openclow.worker.arq_app.WorkerSettings\" /app/src/openclow'
      "
    user: root
    volumes:
      - ./src:/app/src:cached
      - ./workspaces_dev:/workspaces
      - ./dev-sandbox:/app/dev-sandbox:cached
      - claude_auth:/home/openclow/.claude
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LOG_LEVEL=DEBUG
      - DOCKER_BIN=/usr/bin/docker

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
